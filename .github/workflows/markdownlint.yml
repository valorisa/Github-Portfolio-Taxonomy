name: Markdown Lint

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "**/*.markdown"
      - ".markdownlint.json"
      - ".github/workflows/markdownlint.yml"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.md"
      - "**/*.markdown"
      - ".markdownlint.json"
      - ".github/workflows/markdownlint.yml"
  workflow_dispatch:

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          config: .markdownlint.json
          globs: |
            **/*.md
            **/*.markdown
